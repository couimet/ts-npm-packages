name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript-ci-checks:
    uses: couimet/github-actions/.github/workflows/typescript-ci-checks.yml@main
    permissions:
      contents: read
      pull-requests: write

  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: couimet/github-actions/setup-node-pnpm@main
      - uses: couimet/github-actions/install-deps@main
      - name: Typecheck
        run: pnpm typecheck

  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: couimet/github-actions/markdownlint@main
      - uses: couimet/github-actions/shellcheck@main
      - uses: couimet/github-actions/bats-test@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  changeset:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: couimet/github-actions/setup-node-pnpm@main
      - uses: couimet/github-actions/install-deps@main
      - name: Check changeset status
        id: changeset-check
        continue-on-error: true
        run: bash scripts/ci-changeset-check.sh "origin/${{ github.base_ref }}"
      - name: Comment on missing changeset
        if: steps.changeset-check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/ci-changeset-comment.sh upsert "${{ github.event.pull_request.number }}"
      - name: Remove stale changeset comment
        if: steps.changeset-check.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/ci-changeset-comment.sh delete "${{ github.event.pull_request.number }}"
