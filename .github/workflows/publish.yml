name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to publish from
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: couimet/github-actions/setup-node-pnpm@main

      - uses: couimet/github-actions/install-deps@main

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Guard real code changes (pre-release)
        if: github.ref != 'refs/heads/main'
        shell: bash
        run: |
          git fetch origin main --depth=20 --quiet

          real_changes=$(git diff --name-only origin/main...HEAD \
            | grep -v '^\.changeset/' \
            | grep -v '/package\.json$' \
            | grep -v '^package\.json$' \
            || true)

          if [[ -z "$real_changes" ]]; then
            echo "::error::Pre-release publish requires real code changes. Only changeset files and version bumps were modified."
            echo ""
            echo "At least one source file must change for a pre-release publish."
            exit 1
          fi

          echo "Real code changes found:"
          echo "$real_changes"

      - name: Build and test
        run: pnpm build && pnpm test

      - name: Authenticate with npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
          echo "npm auth configured"

      - name: Publish packages
        shell: bash
        run: |
          set -euo pipefail

          is_main="${{ github.ref == 'refs/heads/main' }}"

          if [[ "$is_main" == "true" ]]; then
            pnpm changeset publish
          else
            pnpm changeset publish --no-git-tag 2>&1 | tee /tmp/publish-output.txt
            rc=${PIPESTATUS[0]}

            if [[ $rc -ne 0 ]]; then
              echo "::error::Publish command failed with exit code ${rc}"
              exit $rc
            fi

            if grep -q "No unpublished projects to publish" /tmp/publish-output.txt; then
              echo "::error::No packages were published. This workflow was run manually — expected at least one publish."
              exit 1
            fi

            grep -oE '@[a-z][a-z0-9-]*/[a-z][a-z0-9-]*@[0-9]+\.[0-9]+\.[0-9]+[^[:space:]]*' /tmp/publish-output.txt | sort -u | while read -r spec; do
              echo "Tagging ${spec} as dev"
              npm dist-tag add "$spec" dev
            done
          fi

      - name: Push git tags
        if: github.ref == 'refs/heads/main'
        run: git push --tags origin
