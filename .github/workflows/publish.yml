name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to publish from
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Guard real code changes (pre-release)
        if: github.ref != 'refs/heads/main'
        shell: bash
        run: |
          git fetch origin main --depth=20 --quiet

          real_changes=$(git diff --name-only origin/main...HEAD \
            | grep -v '^\.changeset/' \
            | grep -v '/package\.json$' \
            | grep -v '^package\.json$' \
            || true)

          if [[ -z "$real_changes" ]]; then
            echo "::error::Pre-release publish requires real code changes. Only changeset files and version bumps were modified."
            echo ""
            echo "At least one source file must change for a pre-release publish."
            exit 1
          fi

          echo "Real code changes found:"
          echo "$real_changes"

      - name: Build and test
        run: pnpm build && pnpm test

      - name: Authenticate with npm (OIDC)
        shell: bash
        run: |
          oidc_token=$(curl -sSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm" | jq -r '.value')

          npm_token=$(curl -sSL \
            -H "Authorization: Bearer ${oidc_token}" \
            -X POST https://registry.npmjs.org/-/npm/v1/tokens \
            -H "content-type: application/json" -d '{}' | jq -r '.token')

          npm config set //registry.npmjs.org/:_authToken "${npm_token}"

      - name: Publish packages
        env:
          NPM_CONFIG_PROVENANCE: true
        shell: bash
        run: |

          is_main="${{ github.ref == 'refs/heads/main' }}"

          if [[ "$is_main" == "true" ]]; then
            pnpm changeset publish
          else
            output=$(pnpm changeset publish --no-git-tag 2>&1)
            rc=$?
            echo "$output"

            if [[ $rc -ne 0 ]]; then
              echo "Publish command failed with exit code ${rc}"
              exit $rc
            fi

            if echo "$output" | grep -q "No unpublished projects to publish"; then
              echo "No packages were published. This workflow was run manually — expected at least one publish."
              exit 1
            fi

            echo "$output" | grep -oE '@[a-z][a-z0-9-]*/[a-z][a-z0-9-]*@[0-9]+\.[0-9]+\.[0-9]+[^[:space:]]*' | sort -u | while read -r spec; do
              echo "Tagging ${spec} as dev"
              npm dist-tag add "$spec" dev
            done
          fi

      - name: Push git tags
        if: github.ref == 'refs/heads/main'
        run: git push --tags origin
